name: Documentation issue
description: Report unclear, missing, or outdated documentation.
title: "docs: "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or section
      placeholder: "README.md, HexDocs module page, function docs"
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
    validations:
      required: false
