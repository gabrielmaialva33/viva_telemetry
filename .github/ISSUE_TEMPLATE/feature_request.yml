name: Feature request
description: Propose an improvement to viva_telemetry.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the API or behavior you want.
      placeholder: |
        Example:
        metrics.counter_with_description("jobs_total", "Total processed jobs.")
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Logging
        - Metrics
        - Benchmarks
        - Documentation
        - Build or release
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or other designs you considered.
    validations:
      required: false
